services:
  - type: web
    name: asterley-sommelier
    runtime: node
    nodeVersion: "20"
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
