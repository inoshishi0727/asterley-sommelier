<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="df-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c9a55a"/>
    </marker>
    <marker id="df-arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a8fc9"/>
    </marker>
    <marker id="df-arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5ac97a"/>
    </marker>
    <filter id="df-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a1a" rx="8"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#c9a55a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Data Flow — Request / Response Cycle</text>

  <!-- ===== PHASE LABELS ===== -->
  <text x="450" y="60" text-anchor="middle" fill="#666" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-style="italic">Gold = user request path | Blue = function calling loop | Green = response path</text>

  <!-- ===== MAIN COMPONENTS (vertical columns) ===== -->

  <!-- Widget -->
  <rect x="30" y="90" width="130" height="370" rx="10" fill="#202020" stroke="#333" stroke-width="1"/>
  <text x="95" y="115" text-anchor="middle" fill="#c9a55a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold">Chat Widget</text>
  <line x1="40" y1="123" x2="150" y2="123" stroke="#333" stroke-width="0.8"/>

  <!-- Backend -->
  <rect x="240" y="90" width="160" height="370" rx="10" fill="#202020" stroke="#333" stroke-width="1"/>
  <text x="320" y="115" text-anchor="middle" fill="#c9a55a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold">Backend API</text>
  <line x1="250" y1="123" x2="390" y2="123" stroke="#333" stroke-width="0.8"/>

  <!-- Gemini -->
  <rect x="490" y="90" width="180" height="370" rx="10" fill="#202020" stroke="#333" stroke-width="1"/>
  <text x="580" y="115" text-anchor="middle" fill="#c9a55a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold">Gemini 2.5 Flash</text>
  <line x1="500" y1="123" x2="660" y2="123" stroke="#333" stroke-width="0.8"/>

  <!-- Data Layer -->
  <rect x="740" y="90" width="140" height="370" rx="10" fill="#202020" stroke="#333" stroke-width="1"/>
  <text x="810" y="115" text-anchor="middle" fill="#c9a55a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold">Data Layer</text>
  <line x1="750" y1="123" x2="870" y2="123" stroke="#333" stroke-width="0.8"/>

  <!-- ===== STEP 1: User Message ===== -->
  <rect x="42" y="140" width="106" height="34" rx="6" fill="#2a2520" stroke="#c9a55a" stroke-width="1"/>
  <text x="95" y="161" text-anchor="middle" fill="#f0ece4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">User Message</text>

  <line x1="148" y1="157" x2="250" y2="157" stroke="#c9a55a" stroke-width="1.5" marker-end="url(#df-arrow)"/>
  <text x="199" y="150" text-anchor="middle" fill="#c9a55a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold">1</text>
  <text x="199" y="170" text-anchor="middle" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8">POST /api/chat</text>

  <!-- ===== STEP 2: Backend sends to Gemini ===== -->
  <rect x="255" y="140" width="130" height="50" rx="6" fill="#2a2520" stroke="#c9a55a" stroke-width="1"/>
  <text x="320" y="158" text-anchor="middle" fill="#f0ece4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Load session history</text>
  <text x="320" y="172" text-anchor="middle" fill="#f0ece4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Build prompt + tools</text>

  <line x1="385" y1="165" x2="500" y2="165" stroke="#c9a55a" stroke-width="1.5" marker-end="url(#df-arrow)"/>
  <text x="443" y="158" text-anchor="middle" fill="#c9a55a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold">2</text>
  <text x="443" y="178" text-anchor="middle" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8">generateContent()</text>

  <!-- Gemini contents: System instruction + tools -->
  <rect x="505" y="138" width="150" height="56" rx="6" fill="#2a2520" stroke="#c9a55a" stroke-width="1"/>
  <text x="580" y="155" text-anchor="middle" fill="#f0ece4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">System Instruction</text>
  <text x="580" y="168" text-anchor="middle" fill="#f0ece4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">+ Tool Declarations</text>
  <text x="580" y="181" text-anchor="middle" fill="#f0ece4" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">+ Conversation History</text>

  <!-- ===== STEP 3: Gemini function_call (BLUE loop) ===== -->
  <rect x="505" y="215" width="150" height="34" rx="6" fill="#1e2530" stroke="#5a8fc9" stroke-width="1"/>
  <text x="580" y="236" text-anchor="middle" fill="#b0c8e8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">function_call</text>

  <line x1="505" y1="232" x2="390" y2="232" stroke="#5a8fc9" stroke-width="1.5" marker-end="url(#df-arrow-blue)"/>
  <text x="448" y="225" text-anchor="middle" fill="#5a8fc9" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold">3</text>
  <text x="448" y="245" text-anchor="middle" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8">product_lookup()</text>

  <!-- Backend executes tool -->
  <rect x="255" y="215" width="130" height="34" rx="6" fill="#1e2530" stroke="#5a8fc9" stroke-width="1"/>
  <text x="320" y="236" text-anchor="middle" fill="#b0c8e8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Execute Tool</text>

  <!-- ===== STEP 4: Backend queries data ===== -->
  <line x1="390" y1="270" x2="752" y2="270" stroke="#5a8fc9" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#df-arrow-blue)"/>
  <text x="571" y="264" text-anchor="middle" fill="#5a8fc9" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold">4</text>
  <text x="571" y="283" text-anchor="middle" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8">Query products.json / recipes.json / sessions.db</text>

  <!-- Data boxes -->
  <rect x="755" y="140" width="110" height="28" rx="5" fill="#1e1e1e" stroke="#555" stroke-width="1"/>
  <text x="810" y="158" text-anchor="middle" fill="#aaa" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">products.json</text>

  <rect x="755" y="174" width="110" height="28" rx="5" fill="#1e1e1e" stroke="#555" stroke-width="1"/>
  <text x="810" y="192" text-anchor="middle" fill="#aaa" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">recipes.json</text>

  <rect x="755" y="208" width="110" height="28" rx="5" fill="#1e1e1e" stroke="#555" stroke-width="1"/>
  <text x="810" y="226" text-anchor="middle" fill="#aaa" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">sessions.db</text>

  <!-- Data result returns -->
  <rect x="755" y="256" width="110" height="28" rx="5" fill="#1e2530" stroke="#5a8fc9" stroke-width="1"/>
  <text x="810" y="274" text-anchor="middle" fill="#b0c8e8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Result rows</text>

  <!-- ===== STEP 5: function_response back to Gemini ===== -->
  <rect x="255" y="296" width="130" height="34" rx="6" fill="#1e2530" stroke="#5a8fc9" stroke-width="1"/>
  <text x="320" y="317" text-anchor="middle" fill="#b0c8e8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">function_response</text>

  <line x1="385" y1="313" x2="500" y2="313" stroke="#5a8fc9" stroke-width="1.5" marker-end="url(#df-arrow-blue)"/>
  <text x="443" y="306" text-anchor="middle" fill="#5a8fc9" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold">5</text>
  <text x="443" y="326" text-anchor="middle" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8">tool result JSON</text>

  <!-- Gemini generates structured output -->
  <rect x="505" y="296" width="150" height="34" rx="6" fill="#1e2530" stroke="#5a8fc9" stroke-width="1"/>
  <text x="580" y="317" text-anchor="middle" fill="#b0c8e8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Generate Response</text>

  <!-- ===== STEP 6: Structured response back to Backend (GREEN) ===== -->
  <rect x="505" y="350" width="150" height="42" rx="6" fill="#1e2e20" stroke="#5ac97a" stroke-width="1"/>
  <text x="580" y="367" text-anchor="middle" fill="#b0e8c0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Structured JSON Output</text>
  <text x="580" y="381" text-anchor="middle" fill="#b0e8c0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">text + products + recipes</text>

  <line x1="505" y1="371" x2="390" y2="371" stroke="#5ac97a" stroke-width="1.5" marker-end="url(#df-arrow-green)"/>
  <text x="448" y="364" text-anchor="middle" fill="#5ac97a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold">6</text>
  <text x="448" y="384" text-anchor="middle" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8">structured output</text>

  <!-- Backend validates -->
  <rect x="255" y="350" width="130" height="42" rx="6" fill="#1e2e20" stroke="#5ac97a" stroke-width="1"/>
  <text x="320" y="367" text-anchor="middle" fill="#b0e8c0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Validate + Store</text>
  <text x="320" y="381" text-anchor="middle" fill="#b0e8c0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">in session</text>

  <!-- ===== STEP 7: Response to Widget ===== -->
  <line x1="255" y1="409" x2="148" y2="409" stroke="#5ac97a" stroke-width="1.5" marker-end="url(#df-arrow-green)"/>
  <text x="199" y="402" text-anchor="middle" fill="#5ac97a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" font-weight="bold">7</text>
  <text x="199" y="422" text-anchor="middle" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8">JSON response</text>

  <!-- Widget renders -->
  <rect x="42" y="396" width="106" height="50" rx="6" fill="#1e2e20" stroke="#5ac97a" stroke-width="1"/>
  <text x="95" y="413" text-anchor="middle" fill="#b0e8c0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Render:</text>
  <text x="95" y="426" text-anchor="middle" fill="#b0e8c0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">text + products</text>
  <text x="95" y="439" text-anchor="middle" fill="#b0e8c0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">+ recipes + actions</text>

  <!-- Backend stores to sessions.db -->
  <line x1="390" y1="388" x2="752" y2="388" stroke="#5ac97a" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#df-arrow-green)"/>
  <text x="571" y="400" text-anchor="middle" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8">Save to sessions.db</text>

  <!-- ===== Legend ===== -->
  <rect x="205" y="467" width="490" height="26" rx="6" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <line x1="220" y1="480" x2="245" y2="480" stroke="#c9a55a" stroke-width="1.5" marker-end="url(#df-arrow)"/>
  <text x="252" y="484" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Request</text>
  <line x1="320" y1="480" x2="345" y2="480" stroke="#5a8fc9" stroke-width="1.5" marker-end="url(#df-arrow-blue)"/>
  <text x="352" y="484" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Function calling loop</text>
  <line x1="470" y1="480" x2="495" y2="480" stroke="#5ac97a" stroke-width="1.5" marker-end="url(#df-arrow-green)"/>
  <text x="502" y="484" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Response</text>
  <line x1="575" y1="480" x2="600" y2="480" stroke="#5a8fc9" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#df-arrow-blue)"/>
  <text x="607" y="484" fill="#888" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9">Data access</text>
</svg>